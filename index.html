<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bachata Roma - Eventi</title>

  <link rel="icon" type="image/png" href="./logoBR.png" />

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #b4334c;
      color: #fffaf6;
    }

    header {
      text-align: center;
      padding: 30px 20px 10px;
    }

    .logo {
      width: 130px;
      height: 130px;
      object-fit: contain;
      margin: 0 auto 10px auto;
      display: block;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
    }

    h1 {
      margin: 0;
      font-size: 34px;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 16px;
      opacity: 0.95;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    select {
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      background: #fffaf6;
      color: #b4334c;
      font-weight: bold;
      cursor: pointer;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
      padding: 20px;
    }

    .card {
      background: rgba(0,0,0,0.25);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      cursor: pointer;
    }

    .content {
      padding: 16px;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .info {
      font-size: 15px;
      margin-bottom: 6px;
      opacity: 0.95;
    }

    .btn {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 16px;
      background: #fffaf6;
      color: #b4334c;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
    }

    .loader, .empty {
      text-align: center;
      padding: 40px;
      font-size: 18px;
    }

  </style>
</head>

<body>

<header>

  <img class="logo" src="./logoBR.png" />

  <h1>Bachata Roma</h1>

  <div class="subtitle">
    🔥 Eventi affiliati Go&Dance
  </div>

  <div class="filters">

    <select id="countryFilter">
      <option value="all">🌍 Tutti i Paesi</option>
    </select>

    <select id="dateFilter">
      <option value="all">📅 Tutti gli eventi</option>
      <option value="week">Questa settimana</option>
    </select>

  </div>

</header>

<div id="events" class="container">
  <div class="loader">Caricamento eventi...</div>
</div>

<script>

// 🔥 PROXY RAPIDO (fix CORS)
const BASE_URL =
  "https://api.codetabs.com/v1/proxy?quest=";

const FIRST_API =
  "https://www.goandance.com/api/affiliates/6b69b3cc-49a3-445e-b6cb-8121d472c0c7/events";

let globalEvents = [];

// 🔥 FETCH PAGINATO
async function fetchAllEvents(url, collected = []) {

  const finalUrl = BASE_URL + encodeURIComponent(url);

  const res = await fetch(finalUrl);

  if (!res.ok) throw new Error("API error");

  const json = await res.json();

  collected.push(...(json.data || []));

  if (json.meta?.nextUrl) {
    return fetchAllEvents(json.meta.nextUrl, collected);
  }

  return collected;
}

// 🔥 MESI DINAMICI (12 mesi)
function populateMonths() {

  const select = document.getElementById("dateFilter");
  const now = new Date();

  for (let i = 0; i < 12; i++) {

    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);

    const value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;

    const label = d.toLocaleDateString("it-IT", {
      month: "long",
      year: "numeric"
    });

    const opt = document.createElement("option");

    opt.value = value;
    opt.textContent = label.charAt(0).toUpperCase() + label.slice(1);

    select.appendChild(opt);
  }
}

// 🔥 COUNTRY
function populateCountries(events) {

  const select = document.getElementById("countryFilter");

  select.innerHTML = `<option value="all">🌍 Tutti i Paesi</option>`;

  const countries = [
    ...new Set(events.map(e => e.address?.country?.caption || "Unknown"))
  ].sort();

  countries.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    select.appendChild(opt);
  });
}

// 🔥 FILTER
function filterEvents(events, dateFilter, countryFilter) {

  const now = new Date();

  return events.filter(e => {

    const date = new Date(e.dateFrom);
    const country = e.address?.country?.caption || "Unknown";

    if (countryFilter !== "all" && country !== countryFilter) {
      return false;
    }

    if (dateFilter === "all") return true;

    if (dateFilter === "week") {
      const end = new Date();
      end.setDate(now.getDate() + 7);
      return date >= now && date <= end;
    }

    if (dateFilter.includes("-")) {
      const [y, m] = dateFilter.split("-");
      return (
        date.getFullYear() === parseInt(y) &&
        (date.getMonth() + 1) === parseInt(m)
      );
    }

    return true;
  });
}

// 🔥 RENDER
function render(events) {

  const container = document.getElementById("events");

  container.innerHTML = "";

  events.forEach(e => {

    const url = e.url?.it || e.url?.en;

    const date = new Date(e.dateFrom).toLocaleDateString("it-IT", {
      weekday: "short",
      day: "2-digit",
      month: "long",
      year: "numeric"
    });

    const country = e.address?.country?.caption || "Unknown";

    const card = document.createElement("div");

    card.className = "card";

    card.innerHTML = `

      <a href="${url}" target="_blank">
        <img src="${e.image?.previewUrl || ''}" />
      </a>

      <div class="content">

        <div class="title">
          ${e.name?.it || e.name?.en || 'Evento'}
        </div>

        <div class="info">📅 ${date}</div>
        <div class="info">📍 ${e.address?.locality || ''}</div>
        <div class="info">🌍 ${country}</div>

        <a class="btn" href="${url}" target="_blank">
          Prenota con sconto BR
        </a>

      </div>
    `;

    container.appendChild(card);
  });

  if (events.length === 0) {
    container.innerHTML = `<div class="empty">Nessun evento trovato</div>`;
  }
}

// 🔥 APPLY
function applyFilters() {

  const dateFilter = document.getElementById("dateFilter").value;
  const countryFilter = document.getElementById("countryFilter").value;

  const filtered = filterEvents(globalEvents, dateFilter, countryFilter);

  render(filtered);
}

// 🔥 LOAD
async function loadEvents() {

  try {

    globalEvents = await fetchAllEvents(FIRST_API);

    globalEvents.sort((a, b) => new Date(a.dateFrom) - new Date(b.dateFrom));

    populateCountries(globalEvents);
    populateMonths();

    applyFilters();

  } catch (err) {
    console.error(err);
    document.getElementById("events").innerHTML =
      `<div class="empty">Errore caricamento eventi</div>`;
  }
}

// LISTENERS
document.getElementById("dateFilter").addEventListener("change", applyFilters);
document.getElementById("countryFilter").addEventListener("change", applyFilters);

loadEvents();

</script>

</body>
</html>
