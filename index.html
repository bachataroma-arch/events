<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bachata Roma - Eventi</title>

  <link rel="icon" type="image/png" href="logoBR.png" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #b4334c;
      color: #fffaf6;
    }

    header {
      text-align: center;
      padding: 30px 20px 10px;
    }

    .logo {
      width: 130px;
      height: 130px;
      object-fit: contain;
      margin: 0 auto 10px auto;
      display: block;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
    }

    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 1px;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 16px;
      opacity: 0.95;
    }

    .filter {
      text-align: center;
      margin-top: 15px;
    }

    select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
      padding: 20px;
    }

    .card {
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
    }

    .content {
      padding: 16px;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .info {
      font-size: 15px;
      margin-bottom: 6px;
      opacity: 0.95;
    }

    .btn {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 16px;
      background: #fffaf6;
      color: #b4334c;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
      font-size: 15px;
    }

    .loader {
      text-align: center;
      padding: 40px;
    }
  </style>
</head>

<body>

<header>
  <img class="logo" src="logoBR.png" alt="Bachata Roma Logo" />

  <h1>Bachata Roma</h1>
  <div class="subtitle">🔥 Prossimi eventi affiliati Go&Dance</div>

  <!-- FILTRO -->
  <div class="filter">
    <select id="dateFilter">
      <option value="all">Tutti gli eventi</option>
      <option value="week">Questa settimana</option>
      <option value="month">Questo mese</option>
      <option value="future">Da oggi in poi</option>
    </select>
  </div>
</header>

<div id="events" class="container">
  <div class="loader">Caricamento eventi...</div>
</div>

<script>

const API_URL =
  "https://api.allorigins.win/raw?url=" +
  encodeURIComponent("https://www.goandance.com/api/affiliates/6b69b3cc-49a3-445e-b6cb-8121d472c0c7/events");

function filterEvents(events, filterType) {
  const now = new Date();

  return events.filter(e => {
    const date = new Date(e.dateFrom);

    if (filterType === "future") {
      return date >= now;
    }

    if (filterType === "week") {
      const end = new Date();
      end.setDate(now.getDate() + 7);
      return date >= now && date <= end;
    }

    if (filterType === "month") {
      const end = new Date();
      end.setMonth(now.getMonth() + 1);
      return date >= now && date <= end;
    }

    return true;
  });
}

async function loadEvents() {
  try {
    const res = await fetch(API_URL);
    const json = await res.json();

    const allEvents = json.data.sort(
      (a, b) => new Date(a.dateFrom) - new Date(b.dateFrom)
    );

    const filterType = document.getElementById("dateFilter").value;
    const events = filterEvents(allEvents, filterType);

    const container = document.getElementById("events");
    container.innerHTML = "";

    events.forEach(event => {

      const date = new Date(event.dateFrom).toLocaleDateString("it-IT", {
        weekday: "short",
        day: "2-digit",
        month: "long"
      });

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${event.image?.previewUrl || ''}" />
        <div class="content">
          <div class="title">${event.name?.it || event.name?.en}</div>
          <div class="info">📅 ${date}</div>
          <div class="info">📍 ${event.address?.locality || ''}</div>

          <a class="btn" href="${event.url?.it || event.url?.en}" target="_blank">
            Prenota con sconto BR 
          </a>
        </div>
      `;

      container.appendChild(card);
    });

    if (events.length === 0) {
      container.innerHTML = "<p style='text-align:center'>Nessun evento disponibile</p>";
    }

  } catch (err) {
    document.getElementById("events").innerHTML =
      "<p style='text-align:center'>Errore nel caricamento eventi</p>";
    console.error(err);
  }
}

// reload al cambio filtro
document.getElementById("dateFilter").addEventListener("change", loadEvents);

loadEvents();

</script>

</body>
</html>
