<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https:; connect-src https://www.goandance.com; frame-ancestors 'none'">

  <title>Bachata Roma - Eventi</title>

  <link rel="icon" type="image/png" href="./logoBR.png" />

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #b4334c;
      color: #fffaf6;
    }

    header {
      text-align: center;
      padding: 30px 20px 10px;
    }

    .logo {
      width: 130px;
      height: 130px;
      object-fit: contain;
      margin: 0 auto 10px auto;
      display: block;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
    }

    h1 {
      margin: 0;
      font-size: 34px;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 16px;
      opacity: 0.95;
    }

    /* FILTERS */
    .filters {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 22px;
      padding: 14px 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 200px;
    }

    .filter-label {
      font-size: 12px;
      opacity: 0.75;
      margin-left: 6px;
    }

    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      background: #fffaf6;
      color: #b4334c;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    select:hover {
      transform: translateY(-1px);
    }

    /* GRID */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 320px));
      justify-content: center;
      gap: 18px;
      padding: 20px;
    }

    /* CARD */
    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(14px);

      display: flex;
      flex-direction: column;

      min-height: 540px;
      position: relative;

      transition:
        transform 0.28s ease,
        box-shadow 0.28s ease,
        border-color 0.28s ease;
    }

    /* 🔥 PREMIUM HOVER */
    .card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow:
        0 30px 60px rgba(0,0,0,0.35),
        0 0 20px rgba(255,255,255,0.08);

      border-color: rgba(255,255,255,0.24);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;

      transition:
        transform 0.5s ease,
        filter 0.5s ease;
    }

    .card:hover img {
      transform: scale(1.08);
      filter: brightness(1.06);
    }

    /* BADGE */
    .badge {
      position: absolute;
      top: 12px;
      left: 12px;

      background: rgba(255,255,255,0.95);
      color: #b4334c;

      font-size: 12px;
      font-weight: 800;

      padding: 7px 11px;
      border-radius: 999px;

      z-index: 2;

      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

    .content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.35;
    }

    .info {
      font-size: 13.5px;
      margin-bottom: 8px;
      opacity: 0.92;
      line-height: 1.4;
    }

    .btn {
      margin-top: auto;
      padding: 14px;

      background: linear-gradient(135deg, #fffaf6, #f2e6e6);
      color: #b4334c;

      text-align: center;
      font-weight: 800;
      border-radius: 12px;
      text-decoration: none;

      transition:
        transform 0.2s ease,
        filter 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .error-message {
      text-align: center;
      padding: 40px 20px;
      color: #ffc0cb;
      font-size: 16px;
    }

  </style>
</head>

<body>

<header>

  <img class="logo" src="./logoBR.png" alt="Bachata Roma Logo" />

  <h1>Bachata Roma</h1>

  <div class="subtitle">
    I migliori eventi del mondo a portata di click 🔥 
  </div>

</header>

<!-- FILTERS -->
<div class="filters">

  <div class="filter-group">
    <div class="filter-label">🌍 Continente</div>

    <select id="continentFilter">
      <option value="all">Ovunque</option>
    </select>
  </div>

  <div class="filter-group">
    <div class="filter-label">📍 Paese</div>

    <select id="countryFilter">
      <option value="all">Tutti i paesi</option>
    </select>
  </div>

  <div class="filter-group">
    <div class="filter-label">📅 Quando</div>

    <select id="monthFilter">
      <option value="all">Tutti i mesi</option>
    </select>
  </div>

</div>

<div id="events" class="container"></div>

<script>

const API = "https://www.goandance.com/api/affiliates/6b69b3cc-49a3-445e-b6cb-8121d472c0c7/events";

let eventsData = [];

const countryNames = new Intl.DisplayNames(['it'], { type: 'region' });

const continentMap = {
  "Europa": new Set([
    "IT","ES","FR","DE","NL","PT","BE","CH","AT","GR",
    "PL","RO","HU","CZ","SE","NO","DK","FI","IE",
    "BG","HR","RS","UA","TR"
  ]),
  "America": new Set([
    "US","CA","MX","BR","AR","CO","CL","PE","VE",
    "DO","CR","PA","UY","EC","GT","HN"
  ]),
  "Asia": new Set([
    "JP","CN","KR","TH","VN","ID","IN","PH","MY",
    "SG","SA","AE","IL","PK","BD"
  ]),
  "Africa": new Set([
    "ZA","EG","MA","TN","DZ","NG","KE","GH","ET","UG","TZ"
  ]),
  "Oceania": new Set([
    "AU","NZ"
  ])
};

function getContinent(code) {
  for (const [k,v] of Object.entries(continentMap)) {
    if (v.has(code)) return k;
  }
  return "Europa";
}

// SECURE: Sanifica URL per evitare XSS
function sanitizeUrl(url) {
  if (!url) return "#";
  try {
    const parsed = new URL(url);
    if (parsed.protocol === "http:" || parsed.protocol === "https:") {
      return url;
    }
  } catch {
    return "#";
  }
  return "#";
}

// SECURE: Sanifica testo per evitare HTML injection
function sanitizeText(text) {
  if (!text) return "";
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

/* FETCH */
async function fetchAll(url, acc = []) {
  try {
    const res = await fetch(url);
    
    if (!res.ok) {
      throw new Error(`API Error: ${res.status}`);
    }
    
    const json = await res.json();
    
    if (json.data && Array.isArray(json.data)) {
      acc.push(...json.data);
    }
    
    if (json.meta?.nextUrl) {
      return fetchAll(json.meta.nextUrl, acc);
    }
    
    return acc;
  } catch (error) {
    console.error("Fetch error:", error);
    showError();
    return acc;
  }
}

/* CONTINENTS */
function populateContinents(events) {
  const sel = document.getElementById("continentFilter");
  
  sel.innerHTML = '<option value="all">Ovunque</option>';
  
  const used = [...new Set(events.map(e => e.address?.country?.code))].filter(Boolean);
  const conts = [...new Set(used.map(getContinent))];
  
  conts.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });
}

/* COUNTRIES */
function populateCountries(continent, events) {
  const sel = document.getElementById("countryFilter");
  
  sel.innerHTML = '<option value="all">Tutti i paesi</option>';
  
  let list = [...new Set(events.map(e => e.address?.country?.code))].filter(Boolean);
  
  if (continent !== "all") {
    list = list.filter(c => getContinent(c) === continent);
  }
  
  list.sort((a,b) =>
    (countryNames.of(a)||a).localeCompare(
      countryNames.of(b)||b,
      "it",
      { sensitivity:"base" }
    )
  );
  
  list.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = countryNames.of(c) || c;
    sel.appendChild(opt);
  });
}

/* MONTHS */
function populateMonths() {
  const sel = document.getElementById("monthFilter");
  const now = new Date();
  
  for (let i=0; i<12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth()+i, 1);
    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    
    const opt = document.createElement("option");
    opt.value = val;
    opt.textContent = d.toLocaleDateString("it-IT", {
      month:"long",
      year:"numeric"
    });
    
    sel.appendChild(opt);
  }
}

/* BADGE */
function getBadge(e) {
  const days = Math.round((new Date(e.dateTo)-new Date(e.dateFrom))/86400000) + 1;
  
  if (days === 1) return "📅 1 giorno";
  if (days <= 3) return "⚡ Weekend";
  if (days <= 5) return `🎉 ${days} giorni`;
  return `💎 ${days} giorni evento`;
}

/* FILTER */
function filterEvents(events) {
  const continent = document.getElementById("continentFilter").value;
  const country = document.getElementById("countryFilter").value;
  const month = document.getElementById("monthFilter").value;
  
  return events.filter(e => {
    const d = new Date(e.dateFrom);
    const code = e.address?.country?.code;
    
    if (continent !== "all" && getContinent(code) !== continent) return false;
    if (country !== "all" && code !== country) return false;
    
    if (month !== "all") {
      const m = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      if (m !== month) return false;
    }
    
    return true;
  });
}

/* RENDER - SECURE: Usa createElement instead of innerHTML */
function render(events) {
  const container = document.getElementById("events");
  container.innerHTML = "";
  
  events.forEach(e => {
    const url = sanitizeUrl(e.url?.it || e.url?.en);
    const start = new Date(e.dateFrom).toLocaleDateString("it-IT");
    const end = new Date(e.dateTo).toLocaleDateString("it-IT");
    
    const card = document.createElement("div");
    card.className = "card";
    
    // Badge
    const badge = document.createElement("div");
    badge.className = "badge";
    badge.textContent = getBadge(e);
    card.appendChild(badge);
    
    // Image link
    const imgLink = document.createElement("a");
    imgLink.href = url;
    imgLink.target = "_blank";
    imgLink.rel = "noopener noreferrer";
    
    const img = document.createElement("img");
    img.src = sanitizeUrl(e.image?.previewUrl) || "";
    img.alt = sanitizeText(e.name?.it || e.name?.en || "Evento");
    imgLink.appendChild(img);
    card.appendChild(imgLink);
    
    // Content
    const content = document.createElement("div");
    content.className = "content";
    
    // Title
    const title = document.createElement("div");
    title.className = "title";
    title.textContent = e.name?.it || e.name?.en || "Evento";
    content.appendChild(title);
    
    // Location
    const location = document.createElement("div");
    location.className = "info";
    location.textContent = "📍 " + (e.address?.locality || "");
    content.appendChild(location);
    
    // Dates
    const dates = document.createElement("div");
    dates.className = "info";
    dates.textContent = `📅 ${start} → ${end}`;
    content.appendChild(dates);
    
    // Organizer
    const organizer = document.createElement("div");
    organizer.className = "info";
    organizer.textContent = "👤 " + (e.organizer || "");
    content.appendChild(organizer);
    
    // Button
    const btn = document.createElement("a");
    btn.className = "btn";
    btn.href = url;
    btn.target = "_blank";
    btn.rel = "noopener noreferrer";
    btn.textContent = "Scopri evento";
    content.appendChild(btn);
    
    card.appendChild(content);
    container.appendChild(card);
  });
}

/* ERROR HANDLING */
function showError() {
  const container = document.getElementById("events");
  container.innerHTML = '<div class="error-message">⚠️ Impossibile caricare gli eventi. Riprova più tardi.</div>';
}

/* INIT */
async function init() {
  try {
    eventsData = await fetchAll(API);
    
    if (eventsData.length === 0) {
      showError();
      return;
    }
    
    populateContinents(eventsData);
    populateCountries("all", eventsData);
    populateMonths();
    
    render(eventsData);
  } catch (error) {
    console.error("Init error:", error);
    showError();
  }
}

document.getElementById("continentFilter").addEventListener("change", (e) => {
  populateCountries(e.target.value, eventsData);
  render(filterEvents(eventsData));
});

document.getElementById("countryFilter").addEventListener("change", () => {
  render(filterEvents(eventsData));
});

document.getElementById("monthFilter").addEventListener("change", () => {
  render(filterEvents(eventsData));
});

init();

</script>

</body>
</html>
