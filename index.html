<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Bachata Roma - Eventi</title>

  <link rel="icon" type="image/png" href="./logoBR.png" />

  <meta http-equiv="Content-Security-Policy"
    content="
      default-src 'self' https: data: blob:;
      img-src 'self' https: data: blob:;
      style-src 'self' 'unsafe-inline' https:;
      script-src 'self' 'unsafe-inline' https:;
      connect-src *;
    ">

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #b4334c;
      color: #fffaf6;
      padding-bottom: 80px;
    }

    header {
      text-align: center;
      padding: 30px 20px 10px;
    }

    .logo {
      width: 130px;
      height: 130px;
      object-fit: contain;
      margin: 0 auto 10px auto;
      display: block;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
    }

    h1 { margin: 0; font-size: 34px; }

    .subtitle {
      margin-top: 6px;
      font-size: 16px;
      opacity: 0.95;
    }

    /* FILTERS */
    .filters {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 22px;
      padding: 14px 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      max-width: 950px;
      margin-left: auto;
      margin-right: auto;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 200px;
    }

    .filter-label {
      font-size: 12px;
      opacity: 0.75;
      margin-left: 6px;
    }

    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      background: #fffaf6;
      color: #b4334c;
      font-weight: 700;
      cursor: pointer;
    }

    /* GRID */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 320px));
      justify-content: center;
      gap: 18px;
      padding: 18px;
    }

    /* CARD */
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(14px);
      display: flex;
      flex-direction: column;
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 22px 45px rgba(0,0,0,0.28);
    }

    .card img {
      width: 100%;
      height: 170px;
      object-fit: cover;
    }

    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255,255,255,0.95);
      color: #b4334c;
      font-size: 11px;
      font-weight: 800;
      padding: 5px 8px;
      border-radius: 8px;
    }

    .content {
    background-color: #fffaf6;
    padding: 12px;
    display: flex;
    flex-direction: column;
    flex: 1;
    color: #b4334c;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .info {
      font-size: 12.5px;
      margin-bottom: 5px;
      opacity: 0.9;
    }

    .btn {
      margin-top: auto;
      padding: 11px;
      background: linear-gradient(135deg, #b4334c, #b7334b);
      color: #fffaf6;
      text-align: center;
      font-weight: 800;
      border-radius: 12px;
      text-decoration: none;
    }

    .empty {
      text-align: center;
      padding: 50px;
      font-size: 18px;
      opacity: 0.9;
    }

  </style>
</head>

<body>

<header>
  <img class="logo" src="./logoBR.png"/>
  <h1>Bachata Roma Radar </h1>
  <div class="subtitle">I migliori eventi di bachata nel mondo, in tempo reale 🔥</div>  <br>
  <div class="subtitle" style="font-size: 14px;">+10.000 ballerini già lo usano</div>
</header>

<div class="filters">

  <div class="filter-group">
    <div class="filter-label">🌍 Continente</div>
    <select id="continentFilter">
      <option value="all">Ovunque</option>
    </select>
  </div>

  <div class="filter-group">
    <div class="filter-label">📍 Paese</div>
    <select id="countryFilter">
      <option value="all">Tutti i paesi</option>
    </select>
  </div>

  <div class="filter-group">
    <div class="filter-label">📅 Quando</div>
    <select id="monthFilter">
      <option value="all">Tutti i mesi</option>
    </select>
  </div>

</div>

<div id="events" class="container"></div>

<script>


const API = "https://events-api-1dva.vercel.app/api/events";

let eventsData = [];

const countryNames =
  new Intl.DisplayNames(['it'], { type: 'region' });

const continentMap = {
  "Europa": new Set(["IT","ES","FR","DE","NL","PT","BE","CH","AT","GR","PL","RO","HU","CZ","SE","NO","DK","FI","IE","BG","HR","RS","UA","TR"]),
  "America": new Set(["US","CA","MX","BR","AR","CO","CL","PE","VE","DO","CR","PA","UY","EC","GT","HN"]),
  "Asia": new Set(["JP","CN","KR","TH","VN","ID","IN","PH","MY","SG","SA","AE","IL","PK","BD"]),
  "Africa": new Set(["ZA","EG","MA","TN","DZ","NG","KE","GH","ET","UG","TZ"]),
  "Oceania": new Set(["AU","NZ"])
};







async function fetchAll(url) {
  const res = await fetch(url);

  if (!res.ok) {
    console.error("HTTP ERROR:", res.status);
    return [];
  }

  const json = await res.json();

  return json.data || [];
}





function getContinent(code) {
  for (const [c,set] of Object.entries(continentMap)) {
    if (set.has(code)) return c;
  }
  return "Europa";
}

/* CONTINENTI ORDINATI (EUROPA PRIMA) */
function populateContinents(events) {
  const sel = document.getElementById("continentFilter");

  const used = [...new Set(events.map(e => e.address?.country?.code))].filter(Boolean);
  let continents = [...new Set(used.map(getContinent))];

  continents = continents.sort((a,b) => {
    if (a === "Europa") return -1;
    if (b === "Europa") return 1;
    return a.localeCompare(b, "it", { sensitivity:"base" });
  });

  continents.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });
}

/* PAESI ORDINATI */
function populateCountries(continent, events) {
  const sel = document.getElementById("countryFilter");

  sel.innerHTML = `<option value="all">Tutti i paesi</option>`;

  let list = [...new Set(events.map(e => e.address?.country?.code))].filter(Boolean);

  if (continent !== "all") {
    list = list.filter(c => getContinent(c) === continent);
  }

  list.sort((a,b) =>
    (countryNames.of(a)||a).localeCompare(countryNames.of(b)||b,"it",{sensitivity:"base"})
  );

  list.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = countryNames.of(c) || c;
    sel.appendChild(opt);
  });
}

/* MONTHS */
function populateMonths() {
  const sel = document.getElementById("monthFilter");
  const now = new Date();

  for (let i=0;i<12;i++) {
    const d = new Date(now.getFullYear(), now.getMonth()+i, 1);
    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;

    const opt = document.createElement("option");
    opt.value = val;
    opt.textContent = d.toLocaleDateString("it-IT",{month:"long",year:"numeric"});
    sel.appendChild(opt);
  }
}

function getBadge(e) {
  const days =
    Math.round((new Date(e.dateTo) - new Date(e.dateFrom)) / 86400000) + 1;

  if (days === 1) return "📅 1 giorno";
  if (days <= 3) return "⚡ Weekend";
  if (days <= 5) return `🎉 ${days} giorni`;
  return `💎 ${days} giorni evento`;
}

function filterEvents(events) {
  const continent = continentFilter.value;
  const country = countryFilter.value;
  const month = monthFilter.value;

  return events.filter(e => {
    const d = new Date(e.dateFrom);
    const code = e.address?.country?.code;

    if (continent !== "all" && getContinent(code) !== continent) return false;
    if (country !== "all" && code !== country) return false;

    if (month !== "all") {
      const m = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      if (m !== month) return false;
    }

    return true;
  });
}

function render(events) {
  const c = document.getElementById("events");
  c.innerHTML = "";

  if (!events.length) {
    c.innerHTML = `<div class="empty">Nessun evento trovato</div>`;
    return;
  }

  events.forEach(e => {
    const url = e.url?.it || e.url?.en;
    const start = new Date(e.dateFrom).toLocaleDateString("it-IT");
    const end = new Date(e.dateTo).toLocaleDateString("it-IT");

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="badge">${getBadge(e)}</div>
      <img src="${e.image?.previewUrl || ''}" />
      <div class="content">
        <div class="title">${e.name?.it || e.name?.en || "Evento"}</div>
        <div class="info">📍 ${e.address?.locality || ""}</div>
        <div class="info">📅 ${start} → ${end}</div>
        <div class="info">👤 ${e.organizer || ""}</div>
        <a class="btn" href="${url}" target="_blank">Scopri evento</a>
      </div>
    `;

    c.appendChild(card);
  });
}

async function init() {
  eventsData = await fetchAll(API);

  populateContinents(eventsData);
  populateCountries("all", eventsData);
  populateMonths();

  render(eventsData);
}

continentFilter.onchange = (e) => {
  populateCountries(e.target.value, eventsData);
  render(filterEvents(eventsData));
};

countryFilter.onchange = () => render(filterEvents(eventsData));
monthFilter.onchange = () => render(filterEvents(eventsData));

init();

</script>

</body>
</html>
