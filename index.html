<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bachata Roma - Eventi</title>

  <link rel="icon" type="image/png" href="logoBR.png" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #b4334c;
      color: #fffaf6; /* 🔥 nuovo colore testo */
    }

    header {
      text-align: center;
      padding: 30px 20px 10px;
    }

    .logo {
      width: 130px;
      height: 130px;
      object-fit: contain;
      margin: 0 auto 10px auto;
      display: block;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
    }

    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 1px;
      color: #fffaf6;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 16px;
      opacity: 0.95;
      color: #fffaf6;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
      padding: 20px;
    }

    .card {
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      transition: transform 0.2s ease;
      color: #fffaf6; /* 🔥 testo card */
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
    }

    .content {
      padding: 16px;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      line-height: 1.3;
      color: #fffaf6;
    }

    .info {
      font-size: 15px;
      margin-bottom: 6px;
      opacity: 0.95;
      color: #fffaf6;
    }

    .btn {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 16px;
      background: #fffaf6;
      color: #b4334c;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
      font-size: 15px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .loader {
      text-align: center;
      padding: 40px;
      font-size: 16px;
      color: #fffaf6;
    }
  </style>
</head>

<body>

<header>

  <img class="logo" src="logoBR.png" alt="Bachata Roma Logo" />

  <h1>Bachata Roma</h1>
  <div class="subtitle">🔥 Prossimi eventi affiliati Go&Dance</div>
</header>

<div id="events" class="container">
  <div class="loader">Caricamento eventi...</div>
</div>

<script>
const API_URL =
  "https://api.allorigins.win/raw?url=" +
  encodeURIComponent("https://www.goandance.com/api/affiliates/6b69b3cc-49a3-445e-b6cb-8121d472c0c7/events");
//const API_URL = "https://www.goandance.com/api/affiliates/6b69b3cc-49a3-445e-b6cb-8121d472c0c7/events";
//const API_URL = "/.netlify/functions/events";

async function loadEvents() {
  try {
    const res = await fetch(API_URL);
    const json = await res.json();

    const today = new Date();

    const events = json.data
      .filter(e => new Date(e.dateFrom) >= today)
      .sort((a, b) => new Date(a.dateFrom) - new Date(b.dateFrom));

    const container = document.getElementById("events");
    container.innerHTML = "";

    events.forEach(event => {

      const date = new Date(event.dateFrom).toLocaleDateString("it-IT", {
        weekday: "short",
        day: "2-digit",
        month: "long"
      });

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${event.image?.previewUrl || ''}" />
        <div class="content">
          <div class="title">${event.name?.it || event.name?.en}</div>
          <div class="info">📅 ${date}</div>
          <div class="info">📍 ${event.address?.locality || ''}</div>

          <a class="btn" href="${event.url?.it || event.url?.en}" target="_blank">
            Prenota con sconto BR 
          </a>
        </div>
      `;

      container.appendChild(card);
    });

    if (events.length === 0) {
      container.innerHTML = "<p style='text-align:center'>Nessun evento disponibile</p>";
    }

  } catch (err) {
    document.getElementById("events").innerHTML =
      "<p style='text-align:center'>Errore nel caricamento eventi</p>";
    console.error(err);
  }
}

loadEvents();
</script>

</body>
</html>
