<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bachata Roma - Eventi</title>

  <link rel="icon" type="image/png" href="./logoBR.png" />

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #b4334c;
      color: #fffaf6;
    }

    header {
      text-align: center;
      padding: 30px 20px 10px;
    }

    .logo {
      width: 130px;
      height: 130px;
      object-fit: contain;
      margin: 0 auto 10px auto;
      display: block;

      filter:
        drop-shadow(
          0 10px 20px rgba(0,0,0,0.3)
        );
    }

    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 1px;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 16px;
      opacity: 0.95;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    select {
      padding: 12px 14px;
      border-radius: 10px;
      border: none;

      background: #fffaf6;
      color: #b4334c;

      font-weight: bold;
      font-size: 14px;
      cursor: pointer;

      box-shadow:
        0 4px 10px rgba(0,0,0,0.15);
    }

    .container {
      display: grid;

      grid-template-columns:
        repeat(
          auto-fit,
          minmax(280px, 1fr)
        );

      gap: 18px;

      padding: 20px;
    }

    .card {
      background:
        rgba(0,0,0,0.25);

      backdrop-filter: blur(10px);

      border-radius: 16px;

      overflow: hidden;

      box-shadow:
        0 10px 25px rgba(0,0,0,0.25);

      transition:
        transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
    }

    .content {
      padding: 16px;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .info {
      font-size: 15px;
      margin-bottom: 6px;
      opacity: 0.95;
    }

    .btn {
      display: inline-block;

      margin-top: 12px;

      padding: 12px 16px;

      background: #fffaf6;
      color: #b4334c;

      text-decoration: none;
      font-weight: bold;

      border-radius: 10px;
      font-size: 15px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .loader,
    .empty {
      text-align: center;
      padding: 40px;
      font-size: 18px;
    }

  </style>
</head>

<body>

<header>

  <img
    class="logo"
    src="./logoBR.png"
    alt="Bachata Roma Logo"
  />

  <h1>Bachata Roma</h1>

  <div class="subtitle">
    🔥 Eventi affiliati Go&Dance
  </div>

  <!-- FILTRI -->
  <div class="filters">

    <!-- COUNTRY -->
    <select id="countryFilter">
      <option value="all">
        🌍 Tutti i Paesi
      </option>
    </select>

    <!-- DATE -->
    <select id="dateFilter">

      <option value="all">
        📅 Tutti gli eventi
      </option>

      <option value="week">
        Questa settimana
      </option>

      <option value="2026-06">
        Giugno 2026
      </option>

      <option value="2026-07">
        Luglio 2026
      </option>

      <option value="2026-08">
        Agosto 2026
      </option>

      <option value="2026-09">
        Settembre 2026
      </option>

      <option value="2026-10">
        Ottobre 2026
      </option>

    </select>

  </div>

</header>


<div id="events" class="container">

  <div class="loader">
    Caricamento eventi...
  </div>

</div>


<script>

  // CORS PROXY
  const BASE_URL =
    "https://corsproxy.io/?";

  // API GO&DANCE
  const FIRST_API =
    "https://www.goandance.com/api/affiliates/6b69b3cc-49a3-445e-b6cb-8121d472c0c7/events";

  let globalEvents = [];


  // FETCH TUTTI GLI EVENTI
  async function fetchAllEvents(
    url,
    collected = []
  ) {

    const finalUrl =
      BASE_URL +
      encodeURIComponent(url);

    const res =
      await fetch(finalUrl);

    if (!res.ok) {
      throw new Error(
        "Errore API"
      );
    }

    const json =
      await res.json();

    const newEvents =
      json.data || [];

    collected.push(...newEvents);

    // PAGINAZIONE
    if (json.meta?.nextUrl) {

      return fetchAllEvents(
        json.meta.nextUrl,
        collected
      );
    }

    return collected;
  }


  // COUNTRY DROPDOWN
  function populateCountries(
    events
  ) {

    const select =
      document.getElementById(
        "countryFilter"
      );

    select.innerHTML = `
      <option value="all">
        🌍 Tutti i Paesi
      </option>
    `;

    const countries = [
      ...new Set(
        events.map(
          e =>
            e.address?.country?.caption ||
            "Unknown"
        )
      )
    ].sort();

    countries.forEach(country => {

      const option =
        document.createElement(
          "option"
        );

      option.value = country;

      option.textContent =
        country;

      select.appendChild(option);
    });
  }


  // FILTRI
  function filterEvents(
    events,
    dateFilter,
    countryFilter
  ) {

    const now =
      new Date();

    return events.filter(event => {

      const date =
        new Date(
          event.dateFrom
        );

      const country =
        event.address?.country?.caption ||
        "Unknown";


      // COUNTRY
      if (
        countryFilter !== "all" &&
        country !== countryFilter
      ) {
        return false;
      }


      // DATE
      if (
        dateFilter === "all"
      ) {
        return true;
      }


      // SETTIMANA
      if (
        dateFilter === "week"
      ) {

        const end =
          new Date();

        end.setDate(
          now.getDate() + 7
        );

        return (
          date >= now &&
          date <= end
        );
      }


      // YYYY-MM
      if (
        dateFilter.includes("-")
      ) {

        const [
          year,
          month
        ] =
        dateFilter.split("-");

        return (

          date.getFullYear() ===
            parseInt(year)

          &&

          (
            date.getMonth() + 1
          ) ===
            parseInt(month)

        );
      }

      return true;
    });
  }


  // RENDER EVENTI
  function render(events) {

    const container =
      document.getElementById(
        "events"
      );

    container.innerHTML = "";

    events.forEach(event => {

      const formattedDate =
        new Date(
          event.dateFrom
        ).toLocaleDateString(
          "it-IT",
          {
            weekday: "short",
            day: "2-digit",
            month: "long",
            year: "numeric"
          }
        );

      const country =
        event.address?.country?.caption ||
        "Unknown";

      const card =
        document.createElement(
          "div"
        );

      card.className =
        "card";

      card.innerHTML = `

        <img
          src="${
            event.image?.previewUrl || ''
          }"
        />

        <div class="content">

          <div class="title">
            ${
              event.name?.it ||
              event.name?.en ||
              "Evento"
            }
          </div>

          <div class="info">
            📅 ${formattedDate}
          </div>

          <div class="info">
            📍 ${
              event.address?.locality || ''
            }
          </div>

          <div class="info">
            🌍 ${country}
          </div>

          <a
            class="btn"
            href="${
              event.url?.it ||
              event.url?.en
            }"
            target="_blank"
          >
            Prenota con sconto BR
          </a>

        </div>
      `;

      container.appendChild(
        card
      );
    });


    if (
      events.length === 0
    ) {

      container.innerHTML = `
        <div class="empty">
          Nessun evento trovato
        </div>
      `;
    }
  }


  // APPLICA FILTRI
  function applyFilters() {

    const dateFilter =
      document.getElementById(
        "dateFilter"
      ).value;

    const countryFilter =
      document.getElementById(
        "countryFilter"
      ).value;

    const filtered =
      filterEvents(
        globalEvents,
        dateFilter,
        countryFilter
      );

    render(filtered);
  }


  // LOAD
  async function loadEvents() {

    try {

      globalEvents =
        await fetchAllEvents(
          FIRST_API
        );

      // ORDINA
      globalEvents.sort(
        (a, b) =>
          new Date(a.dateFrom) -
          new Date(b.dateFrom)
      );

      // POPOLA COUNTRY
      populateCountries(
        globalEvents
      );

      // RENDER
      applyFilters();

    } catch(err) {

      console.error(err);

      document.getElementById(
        "events"
      ).innerHTML = `
        <div class="empty">
          Errore caricamento eventi
        </div>
      `;
    }
  }


  // EVENTS
  document
    .getElementById(
      "dateFilter"
    )
    .addEventListener(
      "change",
      applyFilters
    );

  document
    .getElementById(
      "countryFilter"
    )
    .addEventListener(
      "change",
      applyFilters
    );


  // START
  loadEvents();

</script>

</body>
</html>
